<!DOCTYPE html>
<html>
    <head>
        <title>Học HTML cơ bản</title>
        <link rel="icon" href="Images/logo.png">
    </head>
    <body>
        <a href="index.html"> Home </a>
        <a href="list.html"> List </a>
        <a href="table.html"> Table </a>
        <h2>FORM</h2>
        <form action="action.html" enctype="multipart/form-data">
            <fieldset>
                <legend>Đăng ký tài khoản</legend>
                <p>Họ và tên:
                    <input type="text"/>
                </p>
                <p>Tên đăng nhập:
                    <input type="text"/>
                </p>
                <p>Mật khẩu:
                    <input type="password"/>
                </p>
                <p>Giới tính:
                    <input type="radio" name="sex"/>Nam
                    <input type="radio" name="sex"/>Nữ
                </p>
                <p>Sinh nhật: 
                    <input type="date">
                </p>
                <p>Sở thích:
                    <input type="checkbox">Thể thao
                    <input type="checkbox">Du lịch
                    <input type="checkbox">Xem phim
                    <input type="checkbox">Cày game
                </p>
                <p>
                    Bằng cấp:
                    <select>
                        <option>Phổ thông</option>
                        <option>Cao đẳng</option>
                        <option>Đại học</option>
                    </select>
                </p>
                <p>Avatar: 
                    <input type="file" multiple>
                </p>
                <p>Thông tin thêm:</p>
                <textarea></textarea>                
                <br>
                <button type="reset">Reset</button>
                <button type="submit">Đăng ký</button>
            </fieldset>
        </form>
    </body>
</html>
